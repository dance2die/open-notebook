name: Sync Upstream

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours (00:00, 06:00, 12:00, 18:00)
  workflow_dispatch: # Allows manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Sync with upstream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/lfnovo/open-notebook.git
          git fetch upstream
          if ! git merge upstream/main --allow-unrelated-histories -m "Merge upstream main"; then
            echo "Merge failed, checking for modify/delete conflicts..."
            conflicted_files=$(git diff --name-only --diff-filter=U)
            for file in $conflicted_files; do
              if ! git cat-file -e "HEAD:$file" 2>/dev/null; then
                echo "File $file does not exist in HEAD. Keeping it deleted."
                git rm "$file"
              fi
            done
            remaining_conflicts=$(git diff --name-only --diff-filter=U)
            if [ -z "$remaining_conflicts" ]; then
              echo "All conflicts resolved automatically. Committing..."
              git commit --no-edit
            else
              echo "There are still unresolved conflicts:"
              echo "$remaining_conflicts"
              exit 1
            fi
          fi
          git push origin main

